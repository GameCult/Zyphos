  - Zyphos life is shaped by mutable cellular memory and fractal eusocial contracts before Earth analogue labels.
  - Treat ecology as infrastructure, memory, leverage, and negotiation.
  - Use path dependency as a civilizational constraint, not a slogan.
  - Do not import Avatar, Semiosis, or Turtledove proper nouns into setting canon.
