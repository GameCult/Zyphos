project:
  name: Eusocial Interbeing
  type: original_setting_obsidian_vault
  root_content_dir: Eusocial Interbeing
current_status:
  summary: Zyphos biology now has a foundational mutable-memory endosymbiont: sentience and memory exchange exist at cellular, organismal, social, and ecological scales, making eusocial contracts a biosphere baseline rather than a special institution.
  next_action: Derive Airawa, Sa'auei'a, mother trees, breeding grounds, pathogens, and organism analogues from mutable memory endosymbiosis instead of Earth taxonomy with added lore.
active_subgoals:
  - Expand Airawa biology and imperial caste pressures.
  - Expand Sa'auei'a family-unit roles, breeding grounds, and mobile technologies.
  - Define limits and failure states of the Biological Memetic Engine.
  - Keep Zyphos simulation questions synchronized with Aquarium Engine.
invariants:
  - Keep setting canon distinct from inspiration notes.
  - Zyphos life is shaped by mutable cellular memory and fractal eusocial contracts before Earth analogue labels.
  - Treat ecology as infrastructure, memory, leverage, and negotiation.
  - Use path dependency as a civilizational constraint, not a slogan.
  - Do not import Avatar, Semiosis, or Turtledove proper nouns into setting canon.
